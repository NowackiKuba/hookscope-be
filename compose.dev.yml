version: '3.8'

services:
  app:
    build:
      context: .
      target: development
    container_name: hookscope-app-dev
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - '0.0.0.0:8080:8080'
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    entrypoint:
      [
        'sh',
        '-c',
        'chmod +x ./docker/dev/entrypoint && ./docker/dev/entrypoint',
      ]

  postgres:
    image: postgres:13
    container_name: hookscope-postgres-dev
    restart: unless-stopped
    ports:
      - '0.0.0.0:5432:5432'
    environment:
      POSTGRES_USER: 'user'
      POSTGRES_PASSWORD: 'password'
      POSTGRES_DB: 'app'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hookscope-redis-dev
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --save 20 1 --loglevel warning --user user --requirepass eYVX7EwVmmxKPCDmwMtyKVge8oLd2t81
    environment:
      REDIS_USER: ${REDIS_USER}
      REDIS_PASSWORD: ${REDIS_PASSWORD}

volumes:
  postgres_data:
  redis_data:
